<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8b4b8"/>
      <stop offset="100%" style="stop-color:#d4a574"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(232,180,184,0.5)"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer hexagon -->
  <polygon points="32,4 56,18 56,46 32,60 8,46 8,18" fill="none" stroke="url(#g1)" stroke-width="2" opacity="0.4" filter="url(#shadow)"/>
  <!-- Inner diamond -->
  <polygon points="32,12 50,32 32,52 14,32" fill="url(#g1)" filter="url(#shadow)" opacity="0.9"/>
  <!-- Center triangle -->
  <polygon points="32,20 44,38 20,38" fill="white" opacity="0.25"/>
  <!-- Dot -->
  <circle cx="32" cy="32" r="3" fill="white" opacity="0.8" filter="url(#glow)"/>
  <!-- Shadow glow rings -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="url(#g1)" stroke-width="0.5" opacity="0.3"/>
</svg>
